apiVersion: apps/v1
kind: Deployment
metadata:
    name: globomantics
    namespace: globomantics
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: globomantics
  template: 
   metadata:
     lables:
       app: globomantics
    specs:
      containers:
        - name: globomantics
          image: nginx:1.27.5
          ports:
          - containerPort: 80
